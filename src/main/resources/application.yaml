spring:
  application:
    name: vtt

  datasource:
    url: jdbc:postgresql://localhost:5432/tabletop_vtt
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
